version: "3.9"

services:
  ticker-uptime:
    build: .
    container_name: ticker-uptime
    ports:
      - "8080:8080"
    volumes:
      - ./config-file.init:/root/config-file.ini
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7.0-alpine
    container_name: redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:12-alpine
    container_name: postgres
    environment:
      POSTGRES_PASSWORD: 1234
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: {}
